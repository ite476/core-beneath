name: Docs Quality

on:
  pull_request:
    paths:
      - "**/*.md"
      - ".markdownlint.yml"
      - ".github/workflows/docs-quality.yml"
      - "tools/check-doc-schema.ps1"
  push:
    branches:
      - main
      - master
    paths:
      - "**/*.md"
      - ".markdownlint.yml"
      - ".github/workflows/docs-quality.yml"
      - "tools/check-doc-schema.ps1"

jobs:
  docs-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate document schema
        shell: pwsh
        run: ./tools/check-doc-schema.ps1

      - name: Markdown lint
        uses: DavidAnson/markdownlint-cli2-action@v20
        with:
          globs: |
            README.md
            AGENTS.md
            CONTRIBUTING.md
            docs/**/*.md
            .github/PULL_REQUEST_TEMPLATE.md

      - name: Check internal markdown links
        uses: lycheeverse/lychee-action@v2
        with:
          fail: true
          args: >-
            --offline
            --include-fragments
            --no-progress
            README.md
            AGENTS.md
            CONTRIBUTING.md
            docs/**/*.md
            .github/PULL_REQUEST_TEMPLATE.md
